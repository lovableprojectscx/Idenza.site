<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Tracker</title>
</head>
<body>
    <h1>Página de Prueba del Tracker</h1>
    <form id="test-form">
      <input type="email" name="email" placeholder="email@test.com">
      <button type="submit">Enviar test</button>
    </form>
    
    <!-- Incluimos el script con un token y org de prueba genérico -->
    <!-- Customizamos el color al azul corporativo #2563eb -->
    <script 
      src="./tracker.js" 
      data-token="TEST_TOKEN" 
      data-org="TEST_ORG"
      data-color="#2563eb"
    ></script>
</body>
</html>
